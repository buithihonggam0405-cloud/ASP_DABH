<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản Trị - DashUI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #f8fafc; 
            color: #1e293b;
            background-image: 
                radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.08) 0, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.08) 0, transparent 50%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px -10px rgba(31, 38, 135, 0.1);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden isolation">
    <div class="glass-panel w-full max-w-md p-10 rounded-[40px] z-10 relative">
        <div class="text-center mb-10">
            <div class="w-16 h-16 mx-auto bg-blue-600 rounded-2xl flex items-center justify-center shadow-xl shadow-blue-200 mb-6 group transition-transform hover:scale-110">
                <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="text-3xl font-black text-slate-900 tracking-tight">Hệ Thống <span class="text-blue-600">Quản Trị</span></h2>
            <p class="text-sm text-slate-400 font-semibold mt-2">Dành cho Quản trị viên DashUI Pro</p>
        </div>

        <form id="loginForm" class="space-y-6">
            <div id="errorMsg" class="hidden bg-red-50/50 border border-red-100 text-red-500 p-4 rounded-2xl text-xs text-center font-bold"></div>
            
            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Tài khoản</label>
                <div class="relative group">
                    <i data-lucide="user" class="absolute left-4 top-4 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="text" id="username" required class="w-full bg-white/50 border-none rounded-2xl pl-12 pr-4 py-4 text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all font-medium" placeholder="Tên đăng nhập...">
                </div>
            </div>
            <div class="space-y-2">
                <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Mật khẩu bảo mật</label>
                <div class="relative group">
                    <i data-lucide="lock" class="absolute left-4 top-4 w-5 h-5 text-slate-400 group-focus-within:text-blue-500 transition-colors"></i>
                    <input type="password" id="password" required class="w-full bg-white/50 border-none rounded-2xl pl-12 pr-4 py-4 text-sm focus:ring-4 focus:ring-blue-50 outline-none transition-all font-medium" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-5 rounded-[24px] shadow-xl shadow-blue-200 transition-all hover:scale-[1.02] active:scale-95 text-sm mt-4">Truy cập Hệ thống</button>
        </form>

        <p class="text-center mt-8 text-xs text-slate-400 font-medium italic">Vui lòng liên hệ Kỹ thuật nếu quên mật khẩu</p>
    </div>

    <script>
        lucide.createIcons();

        const loginForm = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        if (localStorage.getItem('adminToken')) {
            window.location.href = '/admin.html';
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');
            
            const btn = e.target.querySelector('button');
            const oldText = btn.textContent;
            btn.textContent = "Đang xác thực...";
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('adminToken', data.token);
                    window.location.href = '/admin.html';
                } else {
                    const errorText = await response.text();
                    errorMsg.textContent = errorText || 'Sai tài khoản hoặc mật khẩu!';
                    errorMsg.classList.remove('hidden');
                }
            } catch (error) {
                errorMsg.textContent = 'Lỗi kết nối đến máy chủ!';
                errorMsg.classList.remove('hidden');
            } finally {
                btn.textContent = oldText;
            }
        });
    </script>
</body>
</html>
