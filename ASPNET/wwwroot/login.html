<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập Quản Trị - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0b0f19; color: #f8fafc; }
        .glass-panel {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="h-screen w-full flex items-center justify-center overflow-hidden selection:bg-blue-500/30">
    <!-- Blurred Orbs Background -->
    <div class="fixed top-[-20%] left-[-10%] w-[50%] h-[50%] rounded-full bg-blue-700/20 blur-[150px] pointer-events-none"></div>
    <div class="fixed bottom-[-20%] right-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-700/20 blur-[150px] pointer-events-none"></div>

    <div class="glass-panel w-full max-w-md p-8 rounded-2xl z-10 relative">
        <div class="text-center mb-8">
            <div class="w-16 h-16 mx-auto bg-gradient-to-br from-blue-500 to-indigo-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-500/30 mb-4">
                <i data-lucide="shield-check" class="w-8 h-8 text-white"></i>
            </div>
            <h2 class="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-white to-slate-400">Trạm Quản Trị Hệ Thống</h2>
            <p class="text-sm text-slate-400 mt-1">Vui lòng đăng nhập quyền Admin</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div id="errorMsg" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 p-3 rounded-lg text-sm text-center font-medium"></div>
            
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Tên đăng nhập</label>
                <div class="relative">
                    <i data-lucide="user" class="absolute left-4 top-3.5 w-5 h-5 text-slate-500"></i>
                    <input type="text" id="username" required class="w-full bg-slate-900/50 border border-slate-700 rounded-lg pl-11 pr-4 py-3 focus:border-blue-500 focus:outline-none text-slate-200 transition-colors" placeholder="Nhập tài khoản...">
                </div>
            </div>
            <div>
                <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2">Mật khẩu</label>
                <div class="relative">
                    <i data-lucide="lock" class="absolute left-4 top-3.5 w-5 h-5 text-slate-500"></i>
                    <input type="password" id="password" required class="w-full bg-slate-900/50 border border-slate-700 rounded-lg pl-11 pr-4 py-3 focus:border-blue-500 focus:outline-none text-slate-200 transition-colors" placeholder="••••••••">
                </div>
            </div>
            
            <button type="submit" class="w-full bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-medium py-3 rounded-lg transition-all shadow-lg shadow-blue-500/25 mt-2">Truy cập Dashboard</button>
        </form>
    </div>

    <script>
        lucide.createIcons();
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const errorView = document.getElementById('errorMsg');
            
            btn.textContent = 'Đang kiểm tra...';
            errorView.classList.add('hidden');

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/Auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(res.ok) {
                    const data = await res.json();
                    localStorage.setItem('adminToken', data.token); // Lưu mã thông hành
                    window.location.href = '/admin.html';       // Chuyển hướng
                } else {
                    btn.textContent = 'Truy cập Dashboard';
                    errorView.textContent = 'Sai tài khoản hoặc bạn không phải Admin!';
                    errorView.classList.remove('hidden');
                }
            } catch(e) {
                btn.textContent = 'Truy cập Dashboard';
                errorView.textContent = 'Máy chủ đang tắt, vui lòng bật Terminal!';
                errorView.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
